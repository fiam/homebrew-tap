name: readme

on:
  push:
    branches:
      - main
    paths:
      - "Formula/*.rb"
      - "Casks/*.rb"
      - "scripts/generate-readme.rb"
      - ".github/workflows/readme.yaml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  generate:
    name: generate readme
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true
      - name: Generate README
        run: ruby scripts/generate-readme.rb
      - name: Commit README
        run: |
          set -euo pipefail

          if git diff --quiet -- README.md; then
            echo "README.md is current"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update generated readme"
          git push
